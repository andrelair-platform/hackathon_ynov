name: Prompt Eval — phi3-financial

on:
  push:
    branches: [main]
    paths:
      - 'ollama_server/Modelfile'
      - 'scripts/eval.py'
  pull_request:
    branches: [main]
    paths:
      - 'ollama_server/Modelfile'
      - 'scripts/eval.py'
  # Weekly baseline run — catches silent model weight updates under the same tag
  # (e.g. Ollama ships a new phi4-mini quantization without a version bump).
  # Runs every Monday 06:00 UTC against the current Modelfile on main.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  eval:
    name: Run phi3-financial eval suite
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push git tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements-eval.txt

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Trust minicloud CA
        env:
          MINICLOUD_CA_CERT: ${{ secrets.MINICLOUD_CA_CERT }}
        run: |
          echo "$MINICLOUD_CA_CERT" | base64 -d > /tmp/minicloud-ca.crt
          sudo cp /tmp/minicloud-ca.crt /usr/local/share/ca-certificates/minicloud-ca.crt
          sudo update-ca-certificates
          # Append to certifi so httpx (used by openai client) trusts it
          cat /tmp/minicloud-ca.crt >> $(python3 -c "import certifi; print(certifi.where())")

      - name: Run eval suite
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST:       ${{ secrets.LANGFUSE_HOST }}
          LITELLM_API_KEY:     ${{ secrets.LITELLM_API_KEY }}
          LITELLM_BASE_URL:    ${{ secrets.LITELLM_BASE_URL }}
        run: python scripts/eval.py

      # Tag the prompt version in git after a clean push to main.
      # schedule and workflow_dispatch runs validate but do not re-tag
      # (the version hasn't changed — the tag already exists).
      - name: Tag prompt version in git
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION=$(python3 -c "
          import re, pathlib
          content = pathlib.Path('scripts/eval.py').read_text()
          print(re.search(r'PROMPT_VERSION\s*=\s*[\"\']([\d.]+)[\"\'']', content).group(1))
          ")
          git config user.name  "AndreLiar"
          git config user.email "andrelaurelyvan.kanmegnetabouguie@ynov.com"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists — skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "Tagged and pushed v${VERSION}"
          fi

      - name: Upload eval results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eval-failure-${{ github.run_id }}
          path: |
            ollama_server/Modelfile
          retention-days: 14
